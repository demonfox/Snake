<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 255, 136, 0.1),
                        0 0 60px rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
            letter-spacing: 3px;
        }

        canvas {
            display: block;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.3),
                        inset 0 0 40px rgba(0, 0, 0, 0.5);
            background: linear-gradient(180deg, #0d1b1e 0%, #1a1a2e 100%);
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-size: 1.2rem;
        }

        .score {
            color: #00ff88;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }

        .high-score {
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .controls {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .controls span {
            display: inline-block;
            margin: 0 10px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 20px;
            border: 2px solid #00ff88;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.4);
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
        }

        .overlay p {
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
        }

        .hidden {
            display: none !important;
        }

        .game-over h2 {
            color: #ff4757;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.8);
        }

        .final-score {
            font-size: 3rem;
            color: #00ff88;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 NEON SNAKE</h1>
        
        <div class="score-board">
            <div>Score: <span class="score" id="score">0</span></div>
            <div>High Score: <span class="high-score" id="highScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="600" height="400"></canvas>

        <div class="controls">
            <span>⬆️ ⬇️ ⬅️ ➡️</span> Use Arrow Keys to Move
            <span>SPACE</span> Pause
        </div>

        <div id="startScreen" class="overlay">
            <h2>🎮 READY TO PLAY?</h2>
            <p>Use arrow keys to control the snake<br>
            🟢 Green: Grow +1 (+10 pts)<br>
            🔵 Blue: Grow +2 (+20 pts)<br>
            🔴 Red: Shrink -1 (-5 pts)<br>
            Don't hit walls or shrink to nothing!</p>
            <button class="btn" onclick="startGame()">Start Game</button>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h2>💀 GAME OVER</h2>
            <p>Your final score</p>
            <div class="final-score" id="finalScore">0</div>
            <button class="btn" onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const finalScoreElement = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');

        // Game settings
        const gridSize = 20;
        const tileCountX = canvas.width / gridSize;
        const tileCountY = canvas.height / gridSize;

        let snake = [];
        let targets = [];
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 100;
        let isPaused = false;
        let isGameRunning = false;

        const TARGET_TYPES = {
            GROW_1: { type: 'grow_1', color: '#00ff88', glow: '#00ff88', score: 10, growth: 1 },
            GROW_2: { type: 'grow_2', color: '#00d4ff', glow: '#00d4ff', score: 20, growth: 2 },
            SHRINK: { type: 'shrink', color: '#ff4757', glow: '#ff4757', score: -5, growth: -1 }
        };

        highScoreElement.textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            generateTargets();
        }

        function generateTargets() {
            targets = [];
            const numTargets = Math.floor(Math.random() * 4) + 3; // 3 to 6 targets
            
            // Always have exactly one GROW_2 target
            const grow2Target = createTarget(TARGET_TYPES.GROW_2);
            if (grow2Target) targets.push(grow2Target);
            
            // Calculate remaining targets
            const remaining = numTargets - 1;
            const numGrow1 = Math.floor(Math.random() * (remaining - 1)) + 1; // At least 1 grow1, at least 1 shrink
            const numShrink = remaining - numGrow1;
            
            // Create GROW_1 targets
            for (let i = 0; i < numGrow1; i++) {
                const target = createTarget(TARGET_TYPES.GROW_1);
                if (target) targets.push(target);
            }
            
            // Create SHRINK targets
            for (let i = 0; i < numShrink; i++) {
                const target = createTarget(TARGET_TYPES.SHRINK);
                if (target) targets.push(target);
            }
        }

        function createTarget(targetType) {
            let attempts = 0;
            const maxAttempts = 100;
            
            while (attempts < maxAttempts) {
                const x = Math.floor(Math.random() * tileCountX);
                const y = Math.floor(Math.random() * tileCountY);
                
                // Check if position is on snake
                let onSnake = false;
                for (let segment of snake) {
                    if (segment.x === x && segment.y === y) {
                        onSnake = true;
                        break;
                    }
                }
                
                // Check if position is already occupied by another target
                let onTarget = false;
                for (let target of targets) {
                    if (target.x === x && target.y === y) {
                        onTarget = true;
                        break;
                    }
                }
                
                if (!onSnake && !onTarget) {
                    return { x, y, ...targetType };
                }
                attempts++;
            }
            return null;
        }

        function drawGame() {
            // Clear canvas with fade effect
            ctx.fillStyle = 'rgba(13, 27, 30, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (subtle)
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCountX; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= tileCountY; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw targets with glow
            targets.forEach(target => {
                ctx.shadowBlur = 20;
                ctx.shadowColor = target.glow;
                ctx.fillStyle = target.color;
                ctx.beginPath();
                ctx.arc(
                    target.x * gridSize + gridSize / 2,
                    target.y * gridSize + gridSize / 2,
                    gridSize / 2 - 2,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                
                // Target inner highlight
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(
                    target.x * gridSize + gridSize / 2 - 2,
                    target.y * gridSize + gridSize / 2 - 2,
                    gridSize / 4,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                
                // Draw symbol for target type
                ctx.fillStyle = '#000';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let symbol = '';
                if (target.type === 'grow_1') symbol = '+1';
                else if (target.type === 'grow_2') symbol = '+2';
                else if (target.type === 'shrink') symbol = '-1';
                ctx.fillText(symbol, target.x * gridSize + gridSize / 2, target.y * gridSize + gridSize / 2);
            });

            // Draw snake with gradient and glow
            snake.forEach((segment, index) => {
                const alpha = 1 - (index / snake.length) * 0.5;
                const size = gridSize - 2;
                const x = segment.x * gridSize + 1;
                const y = segment.y * gridSize + 1;

                // Glow effect for head
                if (index === 0) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#00ff88';
                } else {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `rgba(0, 255, 136, ${alpha * 0.5})`;
                }

                // Gradient fill
                const gradient = ctx.createLinearGradient(x, y, x + size, y + size);
                gradient.addColorStop(0, '#00ff88');
                gradient.addColorStop(1, '#00d4ff');
                ctx.fillStyle = gradient;
                
                // Rounded rectangle
                roundRect(ctx, x, y, size, size, 5);
                ctx.fill();

                // Inner highlight
                ctx.shadowBlur = 0;
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 - (index * 0.02)})`;
                ctx.fillRect(x + 2, y + 2, size - 4, size / 2);
            });

            ctx.shadowBlur = 0;
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function updateGame() {
            if (isPaused) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) {
                gameOver();
                return;
            }

            // Check self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Check target collision
            let targetEaten = false;
            for (let i = targets.length - 1; i >= 0; i--) {
                if (head.x === targets[i].x && head.y === targets[i].y) {
                    const target = targets[i];
                    score += target.score;
                    scoreElement.textContent = score;
                    
                    // Apply growth/shrink
                    if (target.growth > 0) {
                        // Grow: already added head, add more segments
                        for (let j = 1; j < target.growth; j++) {
                            snake.push({ ...snake[snake.length - 1] });
                        }
                    } else if (target.growth < 0) {
                        // Shrink: remove segments
                        const shrinkAmount = Math.abs(target.growth);
                        for (let j = 0; j < shrinkAmount; j++) {
                            snake.pop();
                        }
                        
                        // Check if snake shrank to length 0
                        if (snake.length === 0) {
                            gameOver();
                            return;
                        }
                    }
                    
                    // Clear all targets and generate new batch immediately
                    targets = [];
                    generateTargets();
                    targetEaten = true;
                    break;
                }
            }
            
            // Remove tail if no target was eaten and no growth occurred
            if (!targetEaten) {
                snake.pop();
            }
        }

        function gameStep() {
            updateGame();
            drawGame();
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
            
            finalScoreElement.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        function startGame() {
            startScreen.classList.add('hidden');
            initGame();
            isGameRunning = true;
            gameSpeed = 100;
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function restartGame() {
            gameOverScreen.classList.add('hidden');
            initGame();
            isGameRunning = true;
            gameSpeed = 100;
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                    if (dy === 0) { dx = 0; dy = -1; }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (dy === 0) { dx = 0; dy = 1; }
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { dx = -1; dy = 0; }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (dx === 0) { dx = 1; dy = 0; }
                    e.preventDefault();
                    break;
                case ' ':
                    isPaused = !isPaused;
                    e.preventDefault();
                    break;
            }
        });

        // Initial draw
        drawGame();
    </script>
</body>
</html>
